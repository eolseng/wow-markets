name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  addon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install --yes lua5.1
      - run: make addon-check
      - name: Preflight BigWigs package
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28 # v2.5.1
        with:
          args: -d -u
      - name: Validate preflight archive
        shell: bash
        run: |
          shopt -s nullglob
          archives=(.release/*.zip)
          if (( ${#archives[@]} != 1 )); then
            printf 'expected exactly one preflight archive, found %d\n' "${#archives[@]}" >&2
            exit 1
          fi
          ./scripts/release/validate-addon-package.sh "${archives[0]}"

  companion:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.1
      - run: make companion-check
