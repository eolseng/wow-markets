name: Companion Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact companion semantic version from companion/wails.json
        required: true
        type: string
      create_draft_release:
        description: Create a GitHub draft release after validation
        required: true
        default: false
        type: boolean

concurrency:
  group: companion-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.version.outputs.channel }}
      build_version: ${{ steps.version.outputs.build_version }}
      version: ${{ steps.version.outputs.version }}
      windows_file_version: ${{ steps.version.outputs.windows_file_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24.14.1
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install --yes lua5.1
      - name: Require protected main source
        run: test "$GITHUB_REF" = refs/heads/main
      - id: version
        name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          ./scripts/release/validate-version.sh companion "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          build_version=$(tr -d '[:space:]' < companion/build-version.txt)
          case "$build_version" in
            ''|*[!0-9]*|0) echo "companion build version must be a positive integer" >&2; exit 1 ;;
          esac
          echo "build_version=$build_version" >> "$GITHUB_OUTPUT"
          windows_file_version=$(./scripts/release/windows-file-version.sh "$VERSION")
          echo "windows_file_version=$windows_file_version" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-*) echo "channel=beta" >> "$GITHUB_OUTPUT" ;;
            *) echo "channel=stable" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Verify client
        run: make check && make release-check

  macos:
    needs: validate
    runs-on: macos-26
    environment: release
    permissions:
      contents: read
    env:
      BUILD_VERSION: ${{ needs.validate.outputs.build_version }}
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
      INSTALLATIONS_URL: ${{ vars.INSTALLATIONS_URL }}
      UPDATE_ORIGIN: ${{ vars.UPDATE_ORIGIN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24.14.1
      - name: Validate release configuration
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$PRODUCTION_API_URL"
          test -n "$INSTALLATIONS_URL"
          test "$UPDATE_ORIGIN" = "https://updates.wowmarkets.app"
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"
      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          CONFIGURED_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          keychain_password=$(uuidgen)
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/wow-markets-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          identity=$CONFIGURED_IDENTITY
          if [ -z "$identity" ]; then
            identity=$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')
          fi
          test -n "$identity"
          echo "APPLE_CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
      - name: Build Apple Silicon app
        working-directory: companion
        run: |
          ldflags="-X main.officialAPIURL=$PRODUCTION_API_URL -X main.officialInstallationsURL=$INSTALLATIONS_URL -X main.officialUpdateOrigin=$UPDATE_ORIGIN"
          go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build \
            -clean -platform darwin/arm64 -ldflags "$ldflags"
      - name: Embed Sparkle 2.9.4
        run: |
          archive="$RUNNER_TEMP/Sparkle-2.9.4.tar.xz"
          framework_root="$RUNNER_TEMP/sparkle"
          curl --fail --location --silent --show-error \
            https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz \
            --output "$archive"
          echo "ce89daf967db1e1893ed3ebd67575ed82d3902563e3191ca92aaec9164fbdef9  $archive" | shasum -a 256 -c -
          mkdir -p "$framework_root"
          tar -xf "$archive" -C "$framework_root" ./Sparkle.framework
          app_path=$(find companion/build/bin -maxdepth 1 -type d -name '*.app' -print)
          test $(printf '%s\n' "$app_path" | grep -c .) -eq 1
          mkdir -p "$app_path/Contents/Frameworks"
          ditto "$framework_root/Sparkle.framework" "$app_path/Contents/Frameworks/Sparkle.framework"
          mkdir -p "$app_path/Contents/Resources/ThirdParty"
          cp companion/third_party/sparkle/LICENSE "$app_path/Contents/Resources/ThirdParty/Sparkle-LICENSE"
          lipo "$app_path/Contents/Frameworks/Sparkle.framework/Sparkle" -verify_arch arm64
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_VERSION" "$app_path/Contents/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_path/Contents/Info.plist")" = "$BUILD_VERSION"
      - name: Sign and package
        run: |
          echo "Locating the app bundle"
          app_path=$(find companion/build/bin -maxdepth 1 -type d -name '*.app' -print)
          test $(printf '%s\n' "$app_path" | grep -c .) -eq 1

          echo "Signing the app bundle"
          codesign --force --deep --options runtime --timestamp \
            --sign "$APPLE_CODESIGN_IDENTITY" "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

          echo "Creating and signing the DMG"
          mkdir -p companion/dist "$RUNNER_TEMP/dmg/WoW Markets Companion"
          ditto "$app_path" "$RUNNER_TEMP/dmg/WoW Markets Companion/WoW Markets Companion.app"
          dmg_path=companion/dist/wow-markets-companion-macos-arm64.dmg
          create_dmg_version=1.3.0
          create_dmg_sha256=c50d2bc97c3d6292642bac55f530d247eaf4bf65ee605f26b4caf339383e381c
          create_dmg_archive="$RUNNER_TEMP/create-dmg.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/create-dmg/create-dmg/archive/refs/tags/v${create_dmg_version}.tar.gz" \
            --output "$create_dmg_archive"
          printf '%s  %s\n' "$create_dmg_sha256" "$create_dmg_archive" | shasum -a 256 -c -
          tar -xzf "$create_dmg_archive" -C "$RUNNER_TEMP"
          "$RUNNER_TEMP/create-dmg-${create_dmg_version}/create-dmg" \
            --volname "WoW Markets Companion" \
            --background companion/build/darwin/dmg-background.png \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 96 \
            --text-size 12 \
            --icon "WoW Markets Companion.app" 165 210 \
            --hide-extension "WoW Markets Companion.app" \
            --app-drop-link 495 210 \
            --no-internet-enable \
            "$dmg_path" \
            "$RUNNER_TEMP/dmg/WoW Markets Companion"

          inspection_dir=$(mktemp -d "$RUNNER_TEMP/dmg-inspection.XXXXXX")
          hdiutil attach "$dmg_path" -nobrowse -readonly -mountpoint "$inspection_dir"
          test -d "$inspection_dir/WoW Markets Companion.app"
          test -L "$inspection_dir/Applications"
          test -f "$inspection_dir/.background/dmg-background.png"
          test -f "$inspection_dir/.DS_Store"
          hdiutil detach "$inspection_dir"
          rmdir "$inspection_dir"
          codesign --force --timestamp --sign "$APPLE_CODESIGN_IDENTITY" "$dmg_path"
          codesign --verify --strict --verbose=2 "$dmg_path"

      - id: notarization
        name: Submit for notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Uploading the signed DMG to Apple's notary service"
          response=$(xcrun notarytool submit \
            companion/dist/wow-markets-companion-macos-arm64.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --no-wait \
            --no-progress \
            --output-format json)
          printf '%s\n' "$response"
          submission_id=$(printf '%s' "$response" | \
            python3 -c 'import json, sys; print(json.load(sys.stdin)["id"])')
          test -n "$submission_id"
          echo "Notarization submission ID: $submission_id"
          echo "submission_id=$submission_id" >> "$GITHUB_OUTPUT"

      - name: Wait for notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SUBMISSION_ID: ${{ steps.notarization.outputs.submission_id }}
        run: |
          echo "Waiting for notarization submission $SUBMISSION_ID"
          xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --timeout 30m

      - name: Staple and verify notarization
        run: |
          dmg_path=companion/dist/wow-markets-companion-macos-arm64.dmg
          echo "Stapling the notarization ticket"
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"
          app_path=$(find companion/build/bin -maxdepth 1 -type d -name '*.app' -print)
          spctl --assess --type execute --verbose=2 "$app_path"
          hdiutil verify "$dmg_path"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$dmg_path"
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: companion/build/bin
          format: spdx-json
          output-file: companion/dist/wow-markets-companion-macos-arm64.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: companion-macos-arm64
          path: companion/dist/*
          if-no-files-found: error
          retention-days: 14

  windows:
    needs: validate
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
    env:
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
      INSTALLATIONS_URL: ${{ vars.INSTALLATIONS_URL }}
      UPDATE_ORIGIN: ${{ vars.UPDATE_ORIGIN }}
      WOW_WINDOWS_FILE_VERSION: ${{ needs.validate.outputs.windows_file_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24.14.1
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress --yes
          $nsis = "${env:ProgramFiles(x86)}\NSIS"
          if (-not (Test-Path (Join-Path $nsis "makensis.exe"))) {
            throw "makensis.exe was not installed at $nsis"
          }
          $stdUtilsArchive = Join-Path $env:RUNNER_TEMP "StdUtils.2018-10-27.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/lordmulder/stdutils/releases/download/1.14/StdUtils.2018-10-27.zip" `
            -OutFile $stdUtilsArchive
          if ((Get-FileHash -Algorithm SHA256 $stdUtilsArchive).Hash.ToLowerInvariant() -ne "3ffe893dc7477fdb1cac551a86ae017509e1f2d0ebdc7185fd0fbaf20870688c") {
            throw "StdUtils archive checksum mismatch"
          }
          $stdUtils = Join-Path $env:RUNNER_TEMP "stdutils"
          Expand-Archive -Path $stdUtilsArchive -DestinationPath $stdUtils
          Copy-Item (Join-Path $stdUtils "Include\StdUtils.nsh") (Join-Path $nsis "Include\StdUtils.nsh")
          Copy-Item (Join-Path $stdUtils "Plugins\Unicode\StdUtils.dll") (Join-Path $nsis "Plugins\x86-unicode\StdUtils.dll")
          New-Item -ItemType Directory -Force -Path "companion\build\windows\installer\tmp" | Out-Null
          Copy-Item (Join-Path $stdUtils "LGPL.txt") "companion\build\windows\installer\tmp\StdUtils-LGPL.txt"
          Copy-Item (Join-Path $stdUtils "LGPL_CLARIFICATION.txt") "companion\build\windows\installer\tmp\StdUtils-LGPL-CLARIFICATION.txt"
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build Windows x64 installer
        working-directory: companion
        shell: pwsh
        run: |
          if (-not $env:PRODUCTION_API_URL -or -not $env:INSTALLATIONS_URL) {
            throw "release service origins are required"
          }
          if ($env:UPDATE_ORIGIN -ne "https://updates.wowmarkets.app") {
            throw "trusted update origin is required"
          }
          if ($env:WOW_WINDOWS_FILE_VERSION -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "numeric Windows file version is required"
          }
          $ldflags = "-X main.officialAPIURL=$env:PRODUCTION_API_URL -X main.officialInstallationsURL=$env:INSTALLATIONS_URL -X main.officialUpdateOrigin=$env:UPDATE_ORIGIN"
          go run github.com/wailsapp/wails/v2/cmd/wails@v2.13.0 build -clean -platform windows/amd64 -nsis -ldflags $ldflags
          $installer = @(Get-ChildItem build/bin -Filter "*-installer.exe")
          if ($installer.Count -ne 1) {
            throw "expected exactly one NSIS installer, found $($installer.Count)"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $installer[0].FullName dist/wow-markets-companion-windows-amd64-setup.exe
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: companion/build/bin
          format: spdx-json
          output-file: companion/dist/wow-markets-companion-windows-amd64.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: companion-windows-amd64
          path: companion/dist/*
          if-no-files-found: error
          retention-days: 14

  assemble:
    needs: [validate, macos, windows]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: companion-*
          path: release-assets
          merge-multiple: true
      - name: Generate signed appcasts
        env:
          CHANNEL: ${{ needs.validate.outputs.channel }}
          BUILD_VERSION: ${{ needs.validate.outputs.build_version }}
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_BASE64 }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          test -n "$UPDATE_SIGNING_PRIVATE_KEY"
          key_path="$RUNNER_TEMP/update-signing-private.key"
          trap 'rm -f "$key_path"' EXIT
          umask 077
          printf '%s' "$UPDATE_SIGNING_PRIVATE_KEY" > "$key_path"
          published_at=$(git show -s --format=%cI "$GITHUB_SHA")
          cd companion
          go run ./cmd/updatefeed generate \
            --private-key "$key_path" \
            --version "$VERSION" \
            --build-version "$BUILD_VERSION" \
            --channel "$CHANNEL" \
            --published-at "$published_at" \
            --assets-dir ../release-assets \
            --output-dir ../release-assets
      - name: Validate and checksum assets
        env:
          CHANNEL: ${{ needs.validate.outputs.channel }}
        run: |
          ./scripts/release/validate-companion-artifacts.sh release-assets "$CHANNEL"
          (cd release-assets && sha256sum \
            "companion-$CHANNEL-macos-arm64.xml" \
            "companion-$CHANNEL-windows-amd64.xml" \
            wow-markets-companion-macos-arm64.dmg \
            wow-markets-companion-windows-amd64-setup.exe \
            wow-markets-companion-macos-arm64.spdx.json \
            wow-markets-companion-windows-amd64.spdx.json > SHA256SUMS)
          (cd release-assets && sha256sum -c SHA256SUMS)
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            release-assets/wow-markets-companion-macos-arm64.dmg
            release-assets/wow-markets-companion-windows-amd64-setup.exe
            release-assets/wow-markets-companion-macos-arm64.spdx.json
            release-assets/wow-markets-companion-windows-amd64.spdx.json
            release-assets/companion-${{ needs.validate.outputs.channel }}-macos-arm64.xml
            release-assets/companion-${{ needs.validate.outputs.channel }}-windows-amd64.xml
            release-assets/SHA256SUMS
      - uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v3
        with:
          subject-path: release-assets/wow-markets-companion-macos-arm64.dmg
          sbom-path: release-assets/wow-markets-companion-macos-arm64.spdx.json
      - uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v3
        with:
          subject-path: release-assets/wow-markets-companion-windows-amd64-setup.exe
          sbom-path: release-assets/wow-markets-companion-windows-amd64.spdx.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: companion-release-${{ needs.validate.outputs.version }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14
      - name: Create draft release
        if: inputs.create_draft_release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          cat > "$RUNNER_TEMP/release-notes.md" <<'NOTES'
          Release candidate for inspection only. Do not publish until the
          companion updater has completed the Phase 4 platform update gates.

          The Windows installer is not Authenticode-signed and will display an
          Unknown Publisher/SmartScreen warning. Verify SHA256SUMS and GitHub
          attestations before installation.
          NOTES
          prerelease=
          case "$VERSION" in *-*) prerelease=--prerelease ;; esac
          gh release create "companion-v$VERSION" release-assets/* \
            --draft $prerelease \
            --target "$GITHUB_SHA" \
            --title "WoW Markets Companion $VERSION" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
